<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cirgonheim – Plac Bramny</title>
    <style>
        :root {
            --gold: #c5a059;
            /* Kąt izometryczny */
            --iso-transform: rotateX(60deg) rotateZ(45deg);
        }

        /* 1. FUNDAMENT - Wyśrodkowanie wszystkiego */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a; /* Tło, jeśli city.jpg nie wczyta się */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* 2. SCENA - Kontener, który trzyma wszystko w kupie */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        /* 3. PODŁOGA - city.jpg */
        .iso-ground {
            position: absolute;
            width: 3000px; /* Bardzo duży plac */
            height: 3000px;
            background-image: url('../../assets/img/city.jpg');
            background-repeat: repeat;
            background-size: 500px; /* Rozmiar tekstury bruku */
            transform: var(--iso-transform);
            z-index: 1;
            /* Winieta: środek jasny, brzegi czarne */
            box-shadow: inset 0 0 1000px rgba(0,0,0,1);
        }

        /* 4. WARSTWA BUDYNKÓW - Płaska warstwa nad podłogą */
        .building-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Klikamy tylko w budynki */
        }

        /* 5. BUDYNEK (Twój rysunek) */
        .iso-object {
            position: absolute;
            /* POZYCJA NA ŚRODKU EKRANU */
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -100%); /* Punkt styku z ziemią to dół obrazka */
            pointer-events: auto;
            cursor: pointer;
            transition: 0.4s ease;
        }

        /* Konkretna pozycja dla Domu Informacyjnego (przesunięcie od środka) */
        #info-house {
            margin-left: -200px; /* Przesunięcie w lewo */
            margin-top: 50px;    /* Przesunięcie w dół */
        }

        .iso-object img {
            width: 400px; /* Dopasuj do swojego rysunku */
            height: auto;
            display: block;
            /* Cień dopasowany do rzutu izometrycznego */
            filter: drop-shadow(30px 50px 15px rgba(0,0,0,0.8));
        }

        .iso-object:hover {
            transform: translate(-50%, -105%) scale(1.03);
            filter: brightness(1.2);
        }

        /* ETYKIETA */
        .iso-label {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            font-size: 0.8rem;
        }

        /* INTERFEJS */
        .top-nav {
            position: fixed; top: 30px; right: 30px; z-index: 100;
            display: flex; gap: 15px;
        }
        .lang-btn { width: 25px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .lang-btn.active { opacity: 1; filter: drop-shadow(0 0 5px var(--gold)); }

        .back-link {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); text-decoration: none;
            text-transform: uppercase; letter-spacing: 4px; font-size: 0.75rem; z-index: 100;
        }
        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="scene">
        <div class="iso-ground"></div>

        <div class="building-layer">
            <div class="iso-object" id="info-house" onclick="location.href='info_house.html'">
                <div class="iso-label" id="label-info">Dom Informacyjny</div>
                <img src="../../assets/img/infohouse.png" alt="Dom Informacyjny">
            </div>
        </div>
    </div>

    <div class="top-nav">
        <img src="https://flagcdn.com/w40/pl.png" class="lang-btn" data-lang="pl" alt="PL">
        <img src="https://flagcdn.com/w40/gb.png" class="lang-btn" data-lang="en" alt="EN">
    </div>

    <a href="../../index.html" class="back-link" id="btn-back">← Powrót do wrót</a>

    <script>
        const translations = {
            pl: { label: "Dom Informacyjny", back: "← Powrót do wrót" },
            en: { label: "Information House", back: "← Back to the gates" }
        };

        function updateLang(lang) {
            document.getElementById('label-info').innerText = translations[lang].label;
            document.getElementById('btn-back').innerText = translations[lang].back;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            localStorage.setItem('selectedLang', lang);
        }

        const savedLang = localStorage.getItem('selectedLang') || 'pl';
        updateLang(savedLang);

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateLang(btn.dataset.lang));
        });
    </script>
</body>
</html>
