<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { --gold: #c5a059; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            overflow: hidden; 
            font-family: 'Georgia', serif; 
        }

        .character-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .character { 
            width: 200px; /* Baza dla skali 1.0 */
            height: auto; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .exit-btn { 
            position: fixed; top: 30px; left: 30px;
            padding: 12px 35px; background: rgba(0,0,0,0.85); 
            border: 1px solid var(--gold); color: var(--gold); 
            cursor: pointer; text-decoration: none; text-transform: uppercase; 
            letter-spacing: 3px; z-index: 1000;
        }
    </style>
</head>
<body>

    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">‹ Powrót na plac</a>

    <div class="character-container">
        <img src="../../assets/img/001_winered.png" class="character char-keeper">
    </div>

    <script type="module">
        import { initKeepers } from '../../assets/js/actors/keeper.js';
        
        window.onload = () => {
            try {
                initKeepers();
            } catch (e) {
                console.error("Błąd ładowania keeper.js");
            }
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
