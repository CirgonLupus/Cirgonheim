<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cirgonheim – Plac Bramny</title>
    <style>
        :root { 
            --gold: #c5a059; 
            --card-width: 450px;
        }
        
        @media (max-width: 768px) {
            :root { --card-width: 280px; }
            .character { width: 80px !important; }
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505 url('../../assets/img/city.jpg') no-repeat center center / cover;
            color: white; font-family: 'Georgia', serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.6) 100%);
        }

        .carousel-container {
            position: relative; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px; z-index: 5;
        }

        .carousel-track { 
            position: relative; width: var(--card-width); height: 600px; 
            transform-style: preserve-3d;
        }
        
        .house-card {
            position: absolute; top: 0; left: 0; width: var(--card-width);
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .house-img { width: 100%; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)); pointer-events: none; }
        
        .character-zone { 
            position: absolute; bottom: 0; width: 100%; height: 40%; 
            pointer-events: none; overflow: visible; 
        }
        
        .character {
            position: absolute; 
            bottom: 10px; 
            width: 125px; 
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.7)); 
            pointer-events: none; 
            z-index: 20;
            transform: scaleX(var(--dir, 1));
        }

        .pinakotheka-card .character { bottom: -65px !important; }

        .house-title-frame {
            border: 2px solid var(--gold); padding: 10px 25px;
            background: rgba(10, 10, 10, 0.9); color: var(--gold);
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px;
            opacity: 0; transition: 0.5s;
        }
        .active .house-title-frame { opacity: 1; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold);
            font-size: 2.5rem; width: 65px; height: 65px; cursor: pointer;
            z-index: 1000; border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }
        .prev { left: 20px; } .next { right: 20px; }
    </style>
</head>
<body>

    <button class="nav-btn prev" id="btn-prev">‹</button>

    <div class="carousel-container">
        <div class="carousel-track" id="main-carousel-track">
            
            <div class="house-card active" data-url="../../interior/dis1/infohouse.html">
                <div class="house-title-frame">O Panu Świata</div>
                <img src="../../assets/img/infohouse.png" class="house-img">
                <div class="character-zone">
                    <img src="../../assets/img/172_spectrumgreen.png" class="character char-wanderer" style="left: 20%">
                    <img src="../../assets/img/007_cosmos.png" class="character char-phaser" style="left: 60%">
                </div>
            </div>

            <div class="house-card pinakotheka-card" data-url="pinakotheka.html">
                <div class="house-title-frame">Pinakoteka</div>
                <img src="../../assets/img/pinakotheka.png" class="house-img">
                <div class="character-zone">
                    <img src="../../assets/img/023_orange.png" class="character char-twister" style="left: 50%">
                </div>
            </div>

        </div>
    </div>

    <button class="nav-btn next" id="btn-next">›</button>

    <script type="module">
        import { initCarousel } from '../../assets/js/engine/carousel.js';
        import { initWanderers } from '../../assets/js/actors/wanderer.js';
        import { initPhasers } from '../../assets/js/actors/phaser.js';
        import { initCalmTwisters } from '../../assets/js/actors/calm_twister.js';

        window.onload = () => {
            // 1. Inicjalizacja Karuzeli
            try {
                const engine = initCarousel(0);
                if (engine) {
                    document.getElementById('btn-next').onclick = engine.moveNext;
                    document.getElementById('btn-prev').onclick = engine.movePrev;
                }
            } catch(e) { 
                console.error("Carousel Error:", e); 
            }
            
            // 2. Obsługa kliknięć w aktywne karty (wejście do wnętrza)
            document.querySelectorAll('.house-card').forEach(card => {
                card.addEventListener('click', function() {
                    if (this.classList.contains('active')) {
                        const targetUrl = this.getAttribute('data-url');
                        if (targetUrl && targetUrl !== "#") {
                            window.location.href = targetUrl;
                        }
                    }
                });
            });

            // 3. Inicjalizacja aktorów
            try {
                initWanderers();
                initPhasers();
                initCalmTwisters();
            } catch(e) {
                console.error("Actors Init Error:", e);
            }

            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
