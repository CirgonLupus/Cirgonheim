<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Cirgonheim – Plac Bramny</title>
    <style>
        :root { --gold: #c5a059; --card-width: 450px; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505 url('../../assets/img/city.jpg') no-repeat center center / cover;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        .carousel-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        .carousel-track { position: relative; width: var(--card-width); height: 600px; transform-style: preserve-3d; }
        .house-card { position: absolute; top: 0; left: 0; width: var(--card-width); display: flex; flex-direction: column; align-items: center; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .house-img { width: 100%; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)); }
        .house-title-frame { border: 2px solid var(--gold); padding: 10px 25px; background: rgba(10, 10, 10, 0.9); color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; opacity: 0; transition: 0.5s; }
        .active .house-title-frame { opacity: 1; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); font-size: 2.5rem; width: 65px; height: 65px; cursor: pointer; z-index: 1000; border-radius: 50%; }
        .prev { left: 20px; } .next { right: 20px; }
    </style>
</head>
<body>
    <button class="nav-btn prev" id="btn-prev">‹</button>
    <div class="carousel-container">
        <div class="carousel-track">
            <div class="house-card active" data-url="../../interior/dis1/infohouse.html">
                <div class="house-title-frame">O Panu Świata</div>
                <img src="../../assets/img/infohouse.png" class="house-img">
            </div>
            <div class="house-card" data-url="#">
                <div class="house-title-frame">Pinakoteka</div>
                <img src="../../assets/img/pinakotheka.png" class="house-img">
            </div>
        </div>
    </div>
    <button class="nav-btn next" id="btn-next">›</button>

    <script type="module">
        import { initCarousel } from '../../assets/js/engine/carousel.js';
        window.onload = () => {
            const engine = initCarousel(0);
            if (engine) {
                document.getElementById('btn-next').onclick = engine.moveNext;
                document.getElementById('btn-prev').onclick = engine.movePrev;
            }
            // Ważne: Kliknięcie przenosi do wnętrza tylko jeśli karta jest aktywna
            document.querySelectorAll('.house-card').forEach(card => {
                card.onclick = () => {
                    if (card.classList.contains('active')) {
                        window.location.href = card.getAttribute('data-url');
                    }
                };
            });
        };
    </script>
</body>
</html>
