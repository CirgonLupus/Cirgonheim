        :root {
            --gold: #c5a059;
            --transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505 url('../../assets/img/city.jpg') no-repeat center center / cover;
            color: white; font-family: 'Georgia', serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* OCHRONA TŁA */
        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        .carousel-container {
            position: relative; width: 100vw; height: 90vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px; z-index: 10;
        }

        .carousel-track {
            position: relative; width: 450px; height: 100%;
            transform-style: preserve-3d;
        }

        .house-card {
            position: absolute; width: 450px;
            display: flex; flex-direction: column; align-items: center;
            transition: all var(--transition);
            cursor: pointer;
            user-select: none;
        }

        .house-img {
            width: 100%; height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
            pointer-events: none;
            -webkit-user-drag: none;
        }
