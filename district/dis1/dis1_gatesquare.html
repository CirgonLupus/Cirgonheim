<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cirgonheim – Plac Bramny</title>
    <style>
        :root { 
            --gold: #c5a059; 
            --transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            --card-width: 450px;
            --spread: 500px; /* Odległość między domkami w 3D */
        }
        
        @media (max-width: 768px) {
            :root { 
                --card-width: 260px; 
                --spread: 300px; /* Mniejszy rozstęp na telefonie */
            }
            .nav-btn { width: 45px !important; height: 45px !important; font-size: 1.2rem !important; }
            .character { width: 70px !important; }
            .pinakotheka-card .character { bottom: -35px !important; }
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505 url('../../assets/img/city.jpg') no-repeat center center / cover;
            color: white; font-family: 'Georgia', serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        .carousel-container {
            position: relative; 
            width: 100%; 
            height: 100%;
            perspective: 1200px; /* Głębia 3D */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .carousel-track { 
            position: relative; 
            width: var(--card-width); 
            height: 600px; 
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .house-card {
            position: absolute; 
            width: var(--card-width);
            transition: all var(--transition); 
            cursor: pointer; 
            user-select: none;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0; /* Ukrywamy domki przed zainicjowaniem przez JS */
        }

        /* Klasa dodawana przez silnik karuzeli dla widocznych elementów */
        .house-card.visible, .house-card.active {
            opacity: 1;
        }

        .house-img { 
            width: 100%; 
            height: auto; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
            pointer-events: none; 
        }
        
        .character-zone { 
            position: absolute; 
            bottom: 0; width: 100%; height: 40%; 
            pointer-events: none; overflow: visible; 
        }
        
        .character {
            position: absolute; 
            bottom: 10px; 
            width: 120px; 
            height: auto;
            transform-origin: center center; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); 
            z-index: 25;
            pointer-events: none;
        }

        .pinakotheka-card .character { bottom: -65px !important; }

        .house-title-frame {
            border: 2px solid var(--gold); 
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.85); 
            color: var(--gold);
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 10px;
            opacity: 0;
            transition: 0.4s;
            white-space: nowrap;
        }

        .active .house-title-frame { opacity: 1; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.7); border: 1px solid var(--gold); color: var(--gold);
            width: 60px; height: 600px; /* Wysokie przyciski ułatwiające klikanie na mobile */
            max-height: 80vh;
            cursor: pointer; z-index: 100; transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem;
            border-radius: 5px;
        }
        .nav-btn:hover { background: rgba(197, 160, 89, 0.2); }
        .prev { left: 0; border-left: none; } 
        .next { right: 0; border-right: none; }

    </style>
</head>
<body>

    <button class="nav-btn prev" id="btn-prev">‹</button>

    <div class="carousel-container">
        <div class="carousel-track" id="main-track">
            
            <div class="house-card active" data-url="about.html">
                <div class="house-title-frame">O Panu Świata</div>
                <img src="../../assets/img/infohouse.png" class="house-img">
                <div class="character-zone">
                    <img src="../../assets/img/172_spectrumgreen.png" class="character char-wanderer">
                    <img src="../../assets/img/007_cosmos.png" class="character char-phaser">
                </div>
            </div>

            <div class="house-card pinakotheka-card" data-url="pinakotheka.html">
                <div class="house-title-frame">Pinakoteka</div>
                <img src="../../assets/img/pinakotheka.png" class="house-img">
                <div class="character-zone">
                    <img src="../../assets/img/023_orange.png" class="character char-twister">
                </div>
            </div>

            <div class="house-card" data-url="market.html">
                <div class="house-title-frame">Targowisko</div>
                <img src="../../assets/img/wip.png" class="house-img">
                <div class="character-zone">
                    <img src="../../assets/img/172_spectrumgreen.png" class="character char-glider">
                </div>
            </div>

        </div>
    </div>

    <button class="nav-btn next" id="btn-next">›</button>

    <script type="module">
        import { initCarousel } from '../../assets/js/engine/carousel.js';
        import { initWanderers } from '../../assets/js/actors/wanderer.js';
        import { initCalmTwisters } from '../../assets/js/actors/calm_twister.js';
        import { initShadowGliders } from '../../assets/js/actors/shadow_glider.js';
        import { initPhasers } from '../../assets/js/actors/phaser.js';

        window.onload = () => {
            // Przekazujemy promień rozstawienia do silnika, jeśli funkcja to wspiera
            const engine = initCarousel(0);
            
            document.getElementById('btn-next').onclick = engine.moveNext;
            document.getElementById('btn-prev').onclick = engine.movePrev;

            initWanderers();
            initCalmTwisters();
            initShadowGliders();
            initPhasers();

            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
