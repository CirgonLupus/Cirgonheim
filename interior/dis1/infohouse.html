        :root {

        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            /* Tło na cały ekran */
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            display: flex; 
            justify-content: center; /* Środek w poziomie */
            align-items: flex-end;    /* Postać na dole ekranu */
            overflow: hidden; 
            font-family: 'Georgia', serif; 
        }

        /* Warstwa przyciemniająca tło dla lepszego klimatu */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.15);
            z-index: 1;
            pointer-events: none;
        }

            position: relative;
            z-index: 10;

            display: flex;
            justify-content: center;
        }
