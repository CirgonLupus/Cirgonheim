<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { 
            --gold: #c5a059; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; 
            font-family: 'Georgia', serif; 
        }

        /* Gigantyczny kontener na tło */
        .interior-wrapper { 
            position: relative; 
            width: 95vw; /* 95% szerokości okna przeglądarki */
            max-width: 1800px; /* Maksymalny limit dla bardzo dużych monitorów */
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
        }

        .background-img { 
            width: 100%; 
            height: auto; 
            filter: drop-shadow(0 0 80px rgba(197, 160, 89, 0.2));
            border: 2px solid rgba(197, 160, 89, 0.3);
        }

        .character-layer { 
            position: absolute; 
            bottom: 10%; /* Regulacja wysokości stania na podłodze grafiki */
            width: 100%; 
            display: flex;
            justify-content: center;
            pointer-events: none; 
        }

        .character { 
            position: relative; 
            width: 250px; /* Ludzik też musi być większy przy takim tle */
            height: auto; 
            transform: scaleX(var(--dir, 1)); 
            transition: transform 0.4s ease-in-out, opacity 0.5s; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9));
        }

        .exit-btn { 
            position: fixed; 
            bottom: 50px; 
            padding: 15px 50px; 
            background: rgba(0,0,0,0.95); 
            border: 2px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: bold;
            transition: 0.3s; 
            z-index: 100;
        }

        .exit-btn:hover { 
            background: var(--gold); 
            color: black; 
            box-shadow: 0 0 30px var(--gold);
        }
    </style>
</head>
<body>

    <div class="interior-wrapper">
        <img src="../../assets/img/indoor.png" class="background-img">
        
        <div class="character-layer">
            <img src="../../assets/img/001_winered.png" class="character char-vinedresser">
        </div>
    </div>

    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">Wróć na plac</a>

    <script type="module">
        import { initVinedressers } from '../../assets/js/actors/vinedresser.js';
        
        window.onload = () => {
            try {
                initVinedressers();
            } catch (e) {
                console.warn("Skrypt vinedresser nie został jeszcze utworzony lub ma błąd ścieżki.");
            }
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
