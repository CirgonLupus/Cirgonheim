<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cirgonheim – Dom Informacyjny</title>
    <style>
        :root { 
            --gold: #c5a059; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505 url('../../assets/img/interior_bg.jpg') no-repeat center center / cover;
            color: white; font-family: 'Georgia', serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background: rgba(0,0,0,0.7);
        }

        /* Główny kontener treści, by wszystko było nad overlayem */
        .content-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%;
        }

        /* OBNIŻONY NAGŁÓWEK */
        .header-section {
            margin-top: 120px; /* Obniżenie tytułu */
            text-align: center;
        }

        .house-title-frame {
            border: 2px solid var(--gold); padding: 15px 50px;
            background: rgba(10, 10, 10, 0.95); color: var(--gold);
            text-transform: uppercase; letter-spacing: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: inline-block;
        }

        /* OBNIŻONY BOX Z INSTRUKCJĄ */
        .instruction-section {
            margin-top: 50px; /* Odstęp między tytułem a instrukcją */
            width: 90%;
            max-width: 550px;
        }

        .base-box {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--gold);
            padding: 25px;
            text-align: center;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px; /* SZTYWNA WYSOKOŚĆ DLA OBU BOXÓW */
            box-sizing: border-box;
        }

        /* POWIĘKSZONY BOX WYJŚCIA */
        .exit-section {
            margin-top: 25px; /* Odstęp między boxami */
            width: 90%;
            max-width: 550px;
        }

        .exit-btn {
            background: rgba(30, 10, 10, 0.9);
            border: 1px solid #822;
            color: #cc4444;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px; /* IDENTYCZNA WYSOKOŚĆ CO BOX POWYŻEJ */
            box-sizing: border-box;
            font-weight: bold;
        }

        .exit-btn:hover {
            background: rgba(180, 20, 20, 0.2);
            color: white;
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

    </style>
</head>
<body>

    <div class="content-wrapper">
        
        <div class="header-section">
            <h1 class="house-title-frame">Dom Informacyjny</h1>
        </div>

        <div class="instruction-section">
            <div class="base-box">
                Wybierz temat z paneli bocznych
            </div>
        </div>

        <div class="exit-section">
            <a href="../../district/dis1/dis1_gatesquare.html" class="exit-btn">
                Wyjście
            </a>
        </div>

    </div>

    <script>
        // Blokada menu kontekstowego
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
