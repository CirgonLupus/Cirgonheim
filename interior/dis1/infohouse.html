<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wnętrze – Dom Informacyjny</title>

    <link rel="stylesheet" href="infohouse.css">
    <link rel="stylesheet" href="../../assets/css/security/protection.css">
</head>
<body>

    <!-- FADE OVERLAY -->
    <div id="transition-overlay"></div>

    <!-- PRZYCISK WYJŚCIA -->
    <a href="#" id="exit-btn" class="exit-btn" data-key="exit-label">Wyjście</a>

    <!-- PRZEŁĄCZNIK JĘZYKA -->
    <div class="lang-switch">
        <img src="https://flagcdn.com/w20/pl.png" class="lang-btn" data-lang="pl" alt="PL">
        <img src="https://flagcdn.com/w20/gb.png" class="lang-btn" data-lang="en" alt="EN">
    </div>

    <!-- NAGŁÓWEK -->
    <div class="info-header-container">
        <h1 class="info-title" data-key="title-main">Dom Informacyjny</h1>
        <div class="info-box">
            <p data-key="subtitle-main">Wybierz temat z paneli bocznych.</p>
        </div>
    </div>

    <div class="side-menu menu-left">
        <div id="btn-me" class="info-rect" data-key="btn-me"></div>
        <div id="btn-city" class="info-rect" data-key="btn-city"></div>
    </div>

    <div class="side-menu menu-right">
        <!-- tu będzie nowy przycisk -->
        <div id="btn-new" class="info-rect" data-key="btn-new"></div>
    </div>

    <!-- KSIĄŻKA -->
        <div id="book-overlay">

            <div class="book-new">

                <!-- Umbilicus -->
                <img id="umbilicus" src="../../assets/img/umbilicus.png" alt="Umbilicus">

                <!-- Shadowbox – czerwony prostokąt -->
                <div id="shadowbox"></div>
        
                <!-- Cornua – wjeżdża z góry -->
                <img id="cornua" src="../../assets/img/cornua.png" alt="Cornua">
        
                <!-- Tekst -->
                <div id="cornua-text"></div>

            <button class="close-book-btn" id="close-book" data-key="close-book">Zamknij</button>
        </div>
    </div>


    <!-- KEEPER -->
    <div class="character-container">
        <img src="../../assets/img/001_winered.png" class="character char-keeper" alt="Keeper">
    </div>

    <!-- <script type="module" src="../../assets/js/security/protection.js"></script> -->
    <script type="module" src="infohouse.js"></script>
</body>
</html>
