<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { 
            --gold: #c5a059; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; 
            font-family: 'Georgia', serif; 
        }

        /* GIGANTYCZNY WIDOK - Wypełnia ekran, zachowując proporcje */
        .interior-wrapper { 
            position: relative; 
            width: 100vw; 
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; /* Centrujemy grafikę w pionie i poziomie */
        }

        .background-img { 
            /* To sprawi, że grafika będzie tak duża, jak to możliwe bez ucinania */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 100px rgba(197, 160, 89, 0.25));
        }

        .character-layer { 
            position: absolute; 
            /* Ustawienie ludzika na "podłodze" grafiki - dopasuj % jeśli trzeba */
            bottom: 15%; 
            width: 100%; 
            display: flex;
            justify-content: center;
            pointer-events: none; 
            z-index: 10;
        }

        .character { 
            position: relative; 
            width: 320px; /* Jeszcze większy ludzik do ogromnego tła */
            height: auto; 
            transform: scaleX(var(--dir, 1)); 
            transition: transform 0.4s ease-in-out, opacity 0.5s; 
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));
        }

        /* PRZYCISK WYJŚCIA - Pancerny */
        .exit-btn { 
            position: fixed; 
            bottom: 40px; 
            right: 40px; /* Przeniesiony w róg, by nie zasłaniał środka */
            padding: 15px 45px; 
            background: rgba(0,0,0,0.9); 
            border: 2px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: bold;
            transition: 0.3s; 
            z-index: 1000;
        }

        .exit-btn:hover { 
            background: var(--gold); 
            color: black; 
            box-shadow: 0 0 40px var(--gold);
        }
    </style>
</head>
<body>

    <div class="interior-wrapper">
        <img src="../../assets/img/indoor.png" class="background-img">
        
        <div class="character-layer">
            <img src="../../assets/img/001_winered.png" class="character char-vinedresser">
        </div>
    </div>

    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">Powrót</a>

    <script type="module">
        import { initVinedressers } from '../../assets/js/actors/vinedresser.js';
        
        window.onload = () => {
            // Jeśli nadal masz błąd powrotu, to kliknięcie w przycisk wypisze ścieżkę w konsoli:
            document.querySelector('.exit-btn').addEventListener('click', function(e) {
                console.log("Próba powrotu do: " + this.href);
            });

            try {
                initVinedressers();
            } catch (e) { console.error("Aktor nie zainicjalizowany"); }
            
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
