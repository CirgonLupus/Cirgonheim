<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { --gold: #c5a059; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Georgia', serif; }
        .interior-wrapper { position: relative; width: 100%; max-width: 900px; display: flex; justify-content: center; align-items: flex-end; }
        .background-img { width: 100%; height: auto; filter: drop-shadow(0 0 30px rgba(197, 160, 89, 0.1)); }
        .character-layer { position: absolute; bottom: 8%; width: 80%; height: 20%; pointer-events: none; }
        .character { position: absolute; bottom: 0; width: 160px; height: auto; transform: scaleX(var(--dir, 1)); transition: left 2s ease-in-out, transform 0.4s, opacity 0.5s; }
        .exit-btn { position: fixed; bottom: 30px; padding: 12px 35px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); cursor: pointer; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .exit-btn:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>
    <div class="interior-wrapper">
        <img src="../../assets/img/indoor.png" class="background-img">
        <div class="character-layer">
            <img src="../../assets/img/001_winered.png" class="character char-vinedresser" style="left: 45%;">
        </div>
    </div>
    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">Wróć na plac</a>

    <script type="module">
        import { initVinedressers } from '../../assets/js/actors/vinedresser.js';
        window.onload = () => {
            initVinedressers();
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
