<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { --gold: #c5a059; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            overflow: hidden; position: relative;
            font-family: 'Georgia', serif; /* Elegancki, klasyczny krój */
        }
        
        /* NAGŁÓWEK I RAMKA INFORMACYJNA */
        .info-header-container {
            position: absolute;
            top: 40px; /* Ta sama wysokość co przycisk wyjścia */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 5;
            color: var(--gold);
            width: 50%; /* Ograniczenie szerokości, by nie nachodziło na przycisk */
        }

        .info-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0 0 15px 0;
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }

        .info-box {
            border: 1px solid var(--gold);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            display: inline-block;
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 15px rgba(197, 160, 89, 0.2);
        }

        .info-text {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.5;
        }

        /* PRZYCISK WYJŚCIA */
        .exit-btn { 
            position: fixed; 
            top: 40px; 
            left: 40px; 
            padding: 18px 50px;
            background: rgba(0,0,0,0.9); 
            border: 2px solid var(--gold);
            color: var(--gold); 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .exit-btn:hover {
            background: var(--gold);
            color: black;
        }

        /* KONTENER LUDZIKA */
        .character-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }
        
        .character { 
            position: absolute;
            width: 150px; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
            transition: all 5000ms ease-in-out; 
        }
    </style>
</head>
<body>

    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">Wyjście</a>

    <div class="info-header-container">
        <h1 class="info-title">Dom Informacyjny</h1>
        <div class="info-box">
            <p class="info-text">Witaj! Tutaj zawarte są informacje na temat tego miasta i jego twórcy.</p>
        </div>
    </div>

    <div class="character-container">
        <img src="../../assets/img/001_winered.png" class="character char-keeper">
    </div>

    <script type="module">
        import { initKeepers } from '../../assets/js/actors/keeper.js';
        window.onload = () => {
            initKeepers();
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
