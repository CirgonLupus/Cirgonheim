<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { 
            --gold: #c5a059; 
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            /* Tło wypełniające cały ekran */
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            overflow: hidden; 
            position: relative;
            font-family: 'Georgia', serif;
        }

        /* Kontener na postać - na cały ekran, by skrypt mógł operować % top/left */
        .character-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .character { 
            position: absolute;
            left: 50%;
            width: 150px; 
            height: auto; 
            /* Startowa pozycja i transformacja - skrypt to przejmie */
            transform: translateX(-50%) scale(1);
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
            transition: top 0.4s linear, transform 0.4s linear;
        }

        .exit-btn { 
            position: fixed; 
            top: 30px; 
            left: 30px;
            padding: 12px 35px; 
            background: rgba(0,0,0,0.85); 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.85rem;
            z-index: 1000;
            transition: 0.3s;
        }

        .exit-btn:hover { 
            background: var(--gold); 
            color: black; 
        }
    </style>
</head>
<body>

    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">‹ Powrót na plac</a>

    <div class="character-container">
        <img src="../../assets/img/001_winered.png" class="character char-keeper">
    </div>

    <script type="module">
        import { initKeepers } from '../../assets/js/actors/keeper.js';
        
        window.onload = () => {
            try {
                // Inicjalizacja skryptu keeper.js, który zarządza ruchem
                initKeepers();
            } catch (e) {
                console.error("Nie udało się załadować keeper.js - upewnij się, że plik istnieje w assets/js/actors/");
            }
            
            // Blokada prawego przycisku myszy
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
