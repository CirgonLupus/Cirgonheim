<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wnętrze – Dom Informacyjny</title>
    <style>
        :root { --gold: #c5a059; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            overflow: hidden; position: relative;
            font-family: 'Georgia', serif;
        }
        
        /* GŁÓWNY NAGŁÓWEK */
        .info-header-container {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 5; color: var(--gold); width: 50%; pointer-events: none; 
        }
        .info-title { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 8px; margin: 0 0 15px 0; text-shadow: 0 5px 15px #000; }
        .info-box { border: 1px solid var(--gold); background: rgba(0, 0, 0, 0.8); padding: 15px 30px; display: inline-block; backdrop-filter: blur(8px); }

        /* PRZYCISKI BOCZNE */
        .side-menu { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .menu-left { left: 40px; }
        .menu-right { right: 40px; }
        .info-rect {
            width: 220px; padding: 15px; background: rgba(0, 0, 0, 0.85); border: 1px solid var(--gold);
            color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: block;
        }
        .info-rect:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); transform: scale(1.05); }

        /* PRZYCISK WYJŚCIA */
        .exit-btn { 
            position: fixed; top: 20px; left: 20px; padding: 10px 30px;
            background: rgba(0,0,0,0.9); border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; text-transform: uppercase;
            font-size: 0.9rem; z-index: 1000;
        }

        /* --- SILNIK GRAFIKI (OVERLAY) --- */
        .book-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 10000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .book-container {
            position: relative; width: 90%; max-width: 1000px;
            display: flex; align-items: center; justify-content: center;
        }
        .book-bg { width: 100%; filter: drop-shadow(0 0 50px #000); }
        
        .book-content {
            position: absolute; top: 15%; left: 15%; width: 70%; height: 60%;
            color: #2a1b0a; /* Kolor "atramentu" na papierze */
            overflow-y: auto; padding: 20px; text-align: center;
        }
        .book-content h2 { font-size: 2.2rem; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid rgba(42, 27, 10, 0.3); }
        .book-content p { font-size: 1.3rem; line-height: 1.6; font-style: italic; }

        .close-book-btn {
            position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 2px solid var(--gold); color: var(--gold);
            padding: 12px 45px; font-size: 1.4rem; cursor: pointer; font-weight: bold;
        }
        .close-book-btn:hover { background: var(--gold); color: black; }

        /* POSTAĆ */
        .character-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .character { position: absolute; width: 150px; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)); }
    </style>
</head>
<body>

    <a href="../../district/dis1/dis1_gatesquare.html" class="exit-btn">Wyjście</a>

    <div class="info-header-container">
        <h1 class="info-title">Dom Informacyjny</h1>
        <div class="info-box">
            <p style="margin:0; letter-spacing: 1px;">Wybierz temat z paneli bocznych.</p>
        </div>
    </div>

    <div class="side-menu menu-left">
        <div class="info-rect" id="btn-about-me">O Mnie</div>
    </div>

    <div class="side-menu menu-right">
        <div class="info-rect" id="btn-about-city">O Cirgonheim'ie</div>
    </div>

    <div id="book-overlay" class="book-overlay">
        <div class="book-container">
            <img src="../../assets/img/book.png" class="book-bg">
            <div class="book-content">
                <h2 id="book-title"></h2>
                <p id="book-text"></p>
            </div>
            <button class="close-book-btn" id="close-book">X</button>
        </div>
    </div>

    <div class="character-container">
        <img src="../../assets/img/001_winered.png" class="character char-keeper">
    </div>

    <script type="module">
        import { initKeepers } from '../../assets/js/actors/keeper.js';
        import { openBook, closeBook } from '../../assets/js/engines/ui-engine.js';

        // Treści do zakładek
        const data = {
            aboutMe: {
                title: "O Autorze",
                text: "Witaj w moich skromnych progach. Jestem twórcą tej krainy. Moim celem było stworzenie miejsca, gdzie kod staje się rzeczywistością..."
            },
            aboutCity: {
                title: "Historia Cirgonheim",
                text: "Cirgonheim to miasto zawieszone w czasie i przestrzeni. Powstało jako bastion wiedzy i technologii w samym sercu nieznanego..."
            }
        };

        window.onload = () => {
            initKeepers();
            document.addEventListener('contextmenu', e => e.preventDefault());

            // Obsługa przycisków
            document.getElementById('btn-about-me').onclick = () => openBook(data.aboutMe.title, data.aboutMe.text);
            document.getElementById('btn-about-city').onclick = () => openBook(data.aboutCity.title, data.aboutCity.text);
            
            // Obsługa zamknięcia
            document.getElementById('close-book').onclick = closeBook;
        };
    </script>
</body>
</html>
