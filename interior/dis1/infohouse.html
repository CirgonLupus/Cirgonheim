<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wnętrze – Dom Informacyjny</title>
    <style>
        :root { --gold: #c5a059; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            overflow: hidden; position: relative;
            font-family: 'Georgia', serif;
        }
        
        /* NAGŁÓWEK */
        .info-header-container {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 5; color: var(--gold); width: 50%; pointer-events: none; 
        }
        .info-title { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 8px; margin: 0 0 15px 0; text-shadow: 0 5px 15px #000; }
        .info-box { border: 1px solid var(--gold); background: rgba(0, 0, 0, 0.8); padding: 15px 30px; display: inline-block; backdrop-filter: blur(8px); }

        /* PRZYCISKI BOCZNE */
        .side-menu { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .menu-left { left: 40px; }
        .menu-right { right: 40px; }
        .info-rect {
            width: 220px; padding: 15px; background: rgba(0, 0, 0, 0.85); border: 1px solid var(--gold);
            color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: block;
        }
        .info-rect:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); transform: scale(1.05); }

        /* WYJŚCIE */
        .exit-btn { 
            position: fixed; top: 20px; left: 20px; padding: 10px 30px;
            background: rgba(0,0,0,0.9); border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; text-transform: uppercase;
            font-size: 0.9rem; z-index: 1000;
        }

        /* UI KSIĄŻKI */
        .book-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 10000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .book-container { position: relative; width: 90%; max-width: 900px; }
        .book-bg { width: 100%; filter: drop-shadow(0 0 50px #000); }
        .book-content {
            position: absolute; top: 15%; left: 15%; width: 70%; height: 65%;
            color: #2a1b0a; overflow-y: auto; padding: 10px; text-align: center;
        }
        .close-book-btn {
            position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: #000; border: 2px solid var(--gold); color: var(--gold);
            padding: 10px 40px; cursor: pointer; font-weight: bold;
        }

        /* POSTAĆ - NAPRAWIONA PŁYNNOŚĆ */
        .character-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .character { 
            position: absolute; 
            width: 150px; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)); 
            /* Transition ustawiona na 4 sekundy sprawia, że postać płynnie "idzie" a nie skacze */
            transition: left 4s ease-in-out, top 4s ease-in-out; 
            will-change: left, top;
        }
    </style>
</head>
<body>

    <a href="../../district/dis1/dis1_gatesquare.html" class="exit-btn">Wyjście</a>

    <div class="info-header-container">
        <h1 class="info-title">Dom Informacyjny</h1>
        <div class="info-box">
            <p style="margin:0; letter-spacing: 1px;">Wybierz temat z paneli bocznych.</p>
        </div>
    </div>

    <div class="side-menu menu-left">
        <div class="info-rect" id="btn-me">O Mnie</div>
    </div>

    <div class="side-menu menu-right">
        <div class="info-rect" id="btn-city">O Cirgonheim'ie</div>
    </div>

    <div id="book-overlay" class="book-overlay">
        <div class="book-container">
            <img src="../../assets/img/book.png" class="book-bg">
            <div class="book-content">
                <h2 id="book-title" style="text-transform: uppercase;"></h2>
                <p id="book-text" style="font-size: 1.2rem; line-height: 1.6;"></p>
            </div>
            <button class="close-book-btn" id="close-book">ZAMKNIJ (X)</button>
        </div>
    </div>

    <div class="character-container">
        <img src="../../assets/img/001_winered.png" id="keeper" class="character">
    </div>

    <script>
        // Treści książki
        const data = {
            me: { title: "O Autorze", text: "Witaj! Jestem twórcą tego świata. Cirgonheim powstało z pasji do detali i starych opowieści." },
            city: { title: "O Cirgonheim'ie", text: "To miasto to serce krainy, miejsce gdzie historia spotyka się z magią w każdym kamieniu." }
        };

        // --- NAPRAWIONY RUCH POSTACI ---
        function initKeeperMovement() {
            const keeper = document.getElementById('keeper');
            if (!keeper) return;

            function move() {
                // Określamy bezpieczny obszar chodzenia (np. dolna połowa ekranu)
                const minX = 100;
                const maxX = window.innerWidth - 250;
                const minY = window.innerHeight * 0.4; // Chodzi tylko w dolnych 60% pokoju
                const maxY = window.innerHeight - 200;

                const nextX = Math.floor(Math.random() * (maxX - minX)) + minX;
                const nextY = Math.floor(Math.random() * (maxY - minY)) + minY;

                keeper.style.left = nextX + 'px';
                keeper.style.top = nextY + 'px';
            }

            // Pierwszy krok i powtarzanie
            move();
            setInterval(move, 5000); // Nowy cel co 5 sekund
        }

        // Funkcje Książki
        function openBook(id) {
            const book = document.getElementById('book-overlay');
            document.getElementById('book-title').innerText = data[id].title;
            document.getElementById('book-text').innerText = data[id].text;
            book.style.display = 'flex';
            setTimeout(() => { book.style.opacity = '1'; }, 10);
        }

        function closeBook() {
            const book = document.getElementById('book-overlay');
            book.style.opacity = '0';
            setTimeout(() => { book.style.display = 'none'; }, 500);
        }

        // Inicjalizacja wszystkiego
        window.onload = () => {
            initKeeperMovement();

            document.getElementById('btn-me').onclick = () => openBook('me');
            document.getElementById('btn-city').onclick = () => openBook('city');
            document.getElementById('close-book').onclick = closeBook;

            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
