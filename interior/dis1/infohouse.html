<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { 
            --gold: #c5a059; 
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            /* Grafika jako tło - całkowicie z tyłu */
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            overflow: hidden; 
            display: flex;
            justify-content: center; /* Centrowanie w poziomie */
            align-items: center;     /* Centrowanie w pionie - postać na środku grafiki */
        }

        .character-container {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .character { 
            /* Zmniejszony o połowę */
            width: 150px; 
            height: auto; 
            /* Zmienna --dir steruje tylko obrotem */
            transform: scaleX(var(--dir, 1)); 
            transition: transform 0.4s ease-in-out, opacity 0.5s; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
        }

        .exit-btn { 
            position: fixed; 
            top: 30px; 
            left: 30px;
            padding: 12px 35px; 
            background: rgba(0,0,0,0.85); 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.85rem;
            z-index: 1000;
        }

        .exit-btn:hover { 
            background: var(--gold); 
            color: black; 
        }
    </style>
</head>
<body>

    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">‹ Powrót na plac</a>

    <div class="character-container">
        <img src="../../assets/img/001_winered.png" class="character char-vinedresser">
    </div>

    <script type="module">
        import { initVinedressers } from '../../assets/js/actors/vinedresser.js';
        
        window.onload = () => {
            try {
                initVinedressers();
            } catch (e) {
                console.error("Nie udało się załadować vinedresser.js");
            }
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
