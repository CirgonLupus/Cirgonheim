<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Dom Informacyjny</title>
    <style>
        :root { 
            --gold: #c5a059; 
            --inner-width: 900px;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; /* Głęboka czerń wokół wnętrza */
            color: white; font-family: 'Georgia', serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Kontener wnętrza */
        .interior-wrapper {
            position: relative;
            width: 100%;
            max-width: var(--inner-width);
            height: auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .background-img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 50px rgba(197, 160, 89, 0.2));
            z-index: 1;
        }

        /* Strefa dla ludzików wewnątrz */
        .character-layer {
            position: absolute;
            bottom: 5%; /* Postacie stoją na podłodze grafiki */
            width: 80%;
            height: 30%;
            z-index: 10;
            pointer-events: none;
        }

        .character {
            position: absolute;
            bottom: 0;
            width: 180px; /* Nieco więksi wewnątrz */
            height: auto;
            transition: left 2s ease-in-out, transform 0.4s, opacity 0.5s;
            transform: scaleX(var(--dir, 1));
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        /* Przycisk wyjścia */
        .exit-btn {
            position: fixed;
            bottom: 30px;
            padding: 10px 30px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            z-index: 100;
            text-decoration: none;
        }

        .exit-btn:hover {
            background: var(--gold);
            color: black;
        }

        @media (max-width: 768px) {
            .character { width: 120px; }
            .interior-wrapper { width: 95%; }
        }
    </style>
</head>
<body>

    <div class="interior-wrapper">
        <img src="../../assets/img/indoor.png" class="background-img">

        <div class="character-layer">
            <img src="../../assets/img/001_winered.png" class="character char-vinedresser" style="left: 40%;">
        </div>
    </div>

    <a href="../../dis1_gatesquare.html" class="exit-btn">Wyjdź na Plac</a>

    <script type="module">
        import { initVinedressers } from '../../assets/js/actors/vinedresser.js';

        window.onload = () => {
            // Inicjalizujemy ruch gospodarza we wnętrzu
            initVinedressers();
            
            // Blokada menu kontekstowego
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
