<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnętrze – Infohouse</title>
    <style>
        :root { 
            --gold: #c5a059; 
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            /* GRAFIKA JAKO TŁO */
            background: #000 url('../../assets/img/indoor.png') no-repeat center center / cover;
            display: flex; 
            justify-content: center; 
            align-items: flex-end; /* Ludzik na dole ekranu */
            overflow: hidden; 
            font-family: 'Georgia', serif; 
        }

        /* Warstwa ochronna (opcjonalna - lekki przyciemniacz, by ludzik lepiej wyglądał) */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            pointer-events: none;
        }

        .character-zone { 
            position: relative;
            width: 100%;
            height: 40vh; /* Obszar ruchu ludzika */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
            padding-bottom: 5vh; /* Odstęp od dolnej krawędzi (podłoga) */
        }

        .character { 
            position: relative; 
            width: 300px; /* Duży, wyraźny gospodarz */
            height: auto; 
            transform: scaleX(var(--dir, 1)); 
            transition: transform 0.4s ease-in-out, opacity 0.5s; 
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));
        }

        .exit-btn { 
            position: fixed; 
            top: 30px; /* Przycisk u góry, by nie psuł widoku podłogi */
            left: 30px;
            padding: 12px 35px; 
            background: rgba(0,0,0,0.8); 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.9rem;
            transition: 0.3s; 
            z-index: 1000;
        }

        .exit-btn:hover { 
            background: var(--gold); 
            color: black; 
            box-shadow: 0 0 20px var(--gold);
        }
    </style>
</head>
<body>

    <a href="../../District/dis1/dis1_gatesquare.html" class="exit-btn">‹ Wyjdź na plac</a>

    <div class="character-zone">
        <img src="../../assets/img/001_winered.png" class="character char-vinedresser">
    </div>

    <script type="module">
        import { initVinedressers } from '../../assets/js/actors/vinedresser.js';
        
        window.onload = () => {
            try {
                initVinedressers();
            } catch (e) {
                console.error("Błąd ładowania aktora:", e);
            }
            // Blokada prawego przycisku
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
